name: Sync iCloud Calendar

on:
  schedule:
    - cron: '0 */4 * * *'   # cada 4 horas
  workflow_dispatch:          # también se puede correr manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download ICS from iCloud
        run: |
          curl -sL \
            "https://p45-caldav.icloud.com/published/2/MTIwODExNDM2MjEyMDgxMQ_N9OFdZ615LKgUgfNU-ZZGK7f7U8agM0t5eueilYy5_zWqTey5efT0j1rx-_ftLDbmtVJTJ1mRLoSBUdaNJYE" \
            -o calendar.ics
          head -2 calendar.ics   # verificar que es un ICS válido

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.ics
          if git diff --cached --quiet; then
            echo "Sin cambios en el calendario."
          else
            git commit -m "chore: sync calendar.ics [skip ci]"
            git push
          fi
