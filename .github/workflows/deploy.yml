name: Auto Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permisos necesarios para JamesIves/github-pages-deploy-action
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            conalep/DEWE/package-lock.json
            conalep/MTHS/package-lock.json

      - name: Install & Build DEWE 💻
        working-directory: conalep/DEWE
        run: |
          npm ci
          npm run build

      - name: Install & Build MTHS 🖥️
        working-directory: conalep/MTHS
        run: |
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
